<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fundamentals — Finance News Sweep</title>
  <meta name="description" content="SEC-backed fundamentals table with cached Cloudflare Pages endpoint." />
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f3;
      --panel: #ffffff;
      --ink: #1e2524;
      --muted: #66706d;
      --line: #d9ddd6;
      --accent: #12614f;
      --accent-soft: #e4f2ed;
      --warn: #8a5a00;
    }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.4;
    }
    .wrap {
      width: min(1040px, calc(100% - 24px));
      margin: 0 auto;
      padding: 20px 0 36px;
    }
    header {
      display: grid;
      grid-template-columns: minmax(150px, 1fr) minmax(260px, 420px) auto;
      align-items: end;
      gap: 12px;
      margin-bottom: 14px;
    }
    h1 { margin: 0; font-size: 28px; letter-spacing: 0; line-height: 1.08; }
    a { color: inherit; opacity: 0.8; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .search {
      display: flex;
      gap: 6px;
      min-width: 0;
    }
    .search-field {
      position: relative;
      flex: 1;
      min-width: 0;
    }
    input, button {
      font: inherit;
      border: 1px solid rgba(127,127,127,0.4);
      border-radius: 8px;
      padding: 10px 12px;
      background: transparent;
      color: inherit;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      text-transform: uppercase;
      min-width: 0;
      background: var(--panel);
      padding-left: 34px;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(18, 97, 79, 0.16);
      outline: 0;
    }
    .search-field::before {
      content: "";
      position: absolute;
      left: 12px;
      top: 50%;
      width: 12px;
      height: 12px;
      border: 2px solid var(--muted);
      border-radius: 50%;
      transform: translateY(-57%);
      pointer-events: none;
    }
    .search-field::after {
      content: "";
      position: absolute;
      left: 24px;
      top: 27px;
      width: 7px;
      height: 2px;
      background: var(--muted);
      transform: rotate(45deg);
      transform-origin: left center;
      pointer-events: none;
    }
    button {
      cursor: pointer;
      font-weight: 650;
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      min-width: 76px;
    }
    button:disabled { cursor: wait; opacity: 0.72; }
    .meta { opacity: 0.72; font-size: 13px; margin-bottom: 14px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .topline {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }
    .ticker {
      font-size: 34px;
      font-weight: 760;
      letter-spacing: 0;
      line-height: 1;
    }
    .name { color: var(--muted); margin-top: 5px; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }
    .profile {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
    }
    .profile span {
      padding: 5px 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fafbf8;
    }
    .desc {
      font-size: 15px;
      line-height: 1.35;
      margin: 0 0 16px;
      max-width: 78ch;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }
    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 11px;
      background: #fbfcfa;
      min-width: 0;
    }
    .label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .value {
      font-size: 20px;
      font-weight: 730;
      margin-top: 4px;
      overflow-wrap: anywhere;
    }
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 560px;
      table-layout: fixed;
      font-size: 14px;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: right;
      white-space: nowrap;
    }
    th:first-child, td:first-child { text-align: left; }
    th { background: #f1f3ee; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    tr:last-child td { border-bottom: 0; }
    .pos { color: #14724f; font-weight: 700; }
    .neg { color: #a23a2f; font-weight: 700; }
    .note {
      color: var(--muted);
      font-size: 13px;
      margin-top: 12px;
    }
    .warn { color: var(--warn); }
    .loading, .error {
      min-height: 220px;
      display: grid;
      place-items: center;
      color: var(--muted);
    }
    .error { color: #a23a2f; }
    .field-error {
      color: #a23a2f;
      font-size: 12px;
      margin: -6px 0 10px;
      min-height: 17px;
    }
    @media (max-width: 720px) {
      .wrap { width: min(100% - 16px, 1040px); padding-top: 12px; }
      header {
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 10px;
      }
      h1 { font-size: 23px; }
      .search {
        grid-column: 1 / -1;
        grid-row: 2;
      }
      .panel { padding: 11px; }
      .topline { display: block; }
      .ticker { font-size: 30px; }
      .badge { margin-top: 10px; }
      .profile { gap: 6px; margin-bottom: 12px; font-size: 12px; }
      .profile span { padding: 4px 6px; }
      .desc { font-size: 14px; line-height: 1.32; margin-bottom: 13px; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 7px; margin-bottom: 13px; }
      .metric { padding: 8px 8px; }
      .label { font-size: 10px; letter-spacing: 0.05em; }
      .value { font-size: 16px; }
      .table-wrap { overflow-x: visible; }
      table { min-width: 0; font-size: 13px; }
      th, td { padding: 8px 5px; }
      th { font-size: 10px; letter-spacing: 0.03em; }
      th:nth-child(1), td:nth-child(1) { width: 17%; }
      th:nth-child(2), td:nth-child(2) { width: 18%; }
      th:nth-child(3), td:nth-child(3) { width: 20%; }
      th:nth-child(4), td:nth-child(4) { width: 24%; }
      th:nth-child(5), td:nth-child(5) { width: 21%; }
    }
    @media print {
      header {
        grid-template-columns: 1fr auto;
      }
      .search, .field-error {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <h1>Fundamentals</h1>
      <form id="fund-form" class="search">
        <div class="search-field">
          <input id="ticker" name="ticker" autocomplete="off" autocapitalize="characters" spellcheck="false" value="WMT" aria-label="Ticker" placeholder="Ticker" />
        </div>
        <button id="load-button" type="submit">Load</button>
      </form>
      <a href="/">News Sweep</a>
    </header>

    <div id="field-error" class="field-error" role="status" aria-live="polite"></div>
    <div id="meta" class="meta">SEC companyfacts + Yahoo chart metadata, cached at the edge.</div>
    <section id="output" class="panel loading">Loading WMT...</section>
  </main>

  <script src="/fund/fund.js" defer></script>
</body>
</html>
