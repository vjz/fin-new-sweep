<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fundamentals — Finance News Sweep</title>
  <meta name="description" content="SEC-backed fundamentals table with cached Cloudflare Pages endpoint." />
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f3;
      --panel: #ffffff;
      --ink: #1e2524;
      --muted: #66706d;
      --line: #d9ddd6;
      --accent: #12614f;
      --accent-soft: #e4f2ed;
      --warn: #8a5a00;
    }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.4;
    }
    .wrap {
      width: min(1040px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 42px;
    }
    header { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
    h1 { margin: 0; font-size: 28px; letter-spacing: 0; }
    a { color: inherit; opacity: 0.8; text-decoration: none; }
    a:hover { text-decoration: underline; }
    form {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      max-width: 420px;
    }
    input, button {
      font: inherit;
      border: 1px solid rgba(127,127,127,0.4);
      border-radius: 8px;
      padding: 10px 12px;
      background: transparent;
      color: inherit;
    }
    input { flex: 1; text-transform: uppercase; min-width: 0; }
    button { cursor: pointer; font-weight: 650; background: var(--accent); color: #fff; border-color: var(--accent); }
    .meta { opacity: 0.72; font-size: 13px; margin-bottom: 14px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .topline {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }
    .ticker {
      font-size: 34px;
      font-weight: 760;
      letter-spacing: 0;
      line-height: 1;
    }
    .name { color: var(--muted); margin-top: 5px; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }
    .profile {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
    }
    .profile span {
      padding: 5px 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fafbf8;
    }
    .desc {
      font-size: 15px;
      margin: 0 0 18px;
      max-width: 78ch;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }
    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      background: #fbfcfa;
      min-width: 0;
    }
    .label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .value {
      font-size: 20px;
      font-weight: 730;
      margin-top: 4px;
      overflow-wrap: anywhere;
    }
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 560px;
      font-size: 14px;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: right;
      white-space: nowrap;
    }
    th:first-child, td:first-child { text-align: left; }
    th { background: #f1f3ee; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    tr:last-child td { border-bottom: 0; }
    .pos { color: #14724f; font-weight: 700; }
    .neg { color: #a23a2f; font-weight: 700; }
    .note {
      color: var(--muted);
      font-size: 13px;
      margin-top: 12px;
    }
    .warn { color: var(--warn); }
    .loading, .error {
      min-height: 220px;
      display: grid;
      place-items: center;
      color: var(--muted);
    }
    .error { color: #a23a2f; }
    @media (max-width: 720px) {
      .wrap { width: min(100% - 20px, 1040px); padding-top: 16px; }
      header { align-items: flex-start; }
      h1 { font-size: 23px; }
      .panel { padding: 14px; }
      .topline { display: block; }
      .ticker { font-size: 30px; }
      .badge { margin-top: 10px; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .value { font-size: 17px; }
      form { max-width: none; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <h1>Fundamentals</h1>
      <a href="/">News Sweep</a>
    </header>

    <form id="fund-form">
      <input id="ticker" name="ticker" autocomplete="off" value="WMT" aria-label="Ticker" />
      <button type="submit">Load</button>
    </form>
    <div id="meta" class="meta">SEC companyfacts + Yahoo chart metadata, cached at the edge.</div>
    <section id="output" class="panel loading">Loading WMT...</section>
  </main>

  <script src="/fund/fund.js" defer></script>
</body>
</html>
