<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fundamentals — Market Sweep</title>
  <meta name="description" content="SEC-backed fundamentals table with cached Cloudflare Pages endpoint." />
  <link rel="stylesheet" href="/app.css?v=20260615-0716" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f3;
      --panel: #ffffff;
      --ink: #1e2524;
      --muted: #66706d;
      --line: #d9ddd6;
      --accent: #12614f;
      --accent-soft: #e4f2ed;
      --warn: #8a5a00;
    }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.4;
    }
    .wrap {
      width: min(1040px, calc(100% - 24px));
      margin: 0 auto;
      padding: 20px 0 36px;
    }
    header {
      display: grid;
      grid-template-columns: minmax(150px, 1fr) minmax(260px, 420px) auto;
      align-items: end;
      gap: 12px;
      margin-bottom: 14px;
    }
    h1 { margin: 0; font-size: 28px; letter-spacing: 0; line-height: 1.08; }
    a { color: inherit; opacity: 0.8; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .brand-title,
    .app-nav a.active {
      opacity: 1;
    }
    .search {
      display: flex;
      gap: 6px;
      min-width: 0;
    }
    .search-field {
      position: relative;
      flex: 1;
      min-width: 0;
    }
    input, button {
      font: inherit;
      border: 1px solid rgba(127,127,127,0.4);
      border-radius: 8px;
      padding: 10px 12px;
      background: transparent;
      color: inherit;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      text-transform: uppercase;
      min-width: 0;
      background: var(--panel);
      padding-left: 34px;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(18, 97, 79, 0.16);
      outline: 0;
    }
    .search-field::before {
      content: "";
      position: absolute;
      left: 12px;
      top: 50%;
      width: 12px;
      height: 12px;
      border: 2px solid var(--muted);
      border-radius: 50%;
      transform: translateY(-57%);
      pointer-events: none;
    }
    .search-field::after {
      content: "";
      position: absolute;
      left: 24px;
      top: 27px;
      width: 7px;
      height: 2px;
      background: var(--muted);
      transform: rotate(45deg);
      transform-origin: left center;
      pointer-events: none;
    }
    button {
      cursor: pointer;
      font-weight: 650;
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      min-width: 76px;
    }
    button:disabled { cursor: wait; opacity: 0.72; }
    .meta { opacity: 0.72; font-size: 13px; margin-bottom: 14px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .topline {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }
    .identity {
      min-width: 0;
      flex: 1;
    }
    .ticker {
      font-size: 34px;
      font-weight: 760;
      letter-spacing: 0;
      line-height: 1;
    }
    .name { color: var(--muted); margin-top: 5px; }
    .top-right {
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      gap: 10px;
      min-width: 260px;
      text-align: right;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }
    .quote-inline {
      border-left: 1px solid var(--line);
      padding-left: 12px;
      min-width: 160px;
    }
    .quote-label {
      color: var(--muted);
      font-size: 11px;
      line-height: 1;
      font-weight: 760;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .quote-main {
      font-size: 26px;
      line-height: 1;
      font-weight: 780;
      margin-top: 4px;
    }
    .quote-change {
      font-size: 13px;
      line-height: 1.15;
      font-weight: 780;
      margin-top: 4px;
      white-space: nowrap;
    }
    .quote-time {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
      font-weight: 650;
      margin-top: 4px;
      white-space: nowrap;
    }
    .profile {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 14px;
    }
    .profile span {
      padding: 5px 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fafbf8;
    }
    .desc {
      font-size: 15px;
      line-height: 1.35;
      margin: 0 0 16px;
      max-width: 78ch;
    }
    .desc-block {
      margin: 0 0 16px;
      max-width: 78ch;
    }
    .desc-block summary {
      display: block;
      cursor: pointer;
      font-size: 15px;
      line-height: 1.35;
    }
    .desc-block summary::-webkit-details-marker {
      display: none;
    }
    .desc-preview {
      color: var(--ink);
    }
    .desc-toggle {
      color: var(--accent);
      font-size: 13px;
      font-weight: 760;
      white-space: nowrap;
    }
    .desc-toggle::before {
      content: " More";
    }
    .desc-block[open] .desc-preview {
      display: none;
    }
    .desc-block[open] .desc-toggle::before {
      content: "";
    }
    .desc-full {
      display: none;
      margin-top: 0;
      margin-bottom: 0;
    }
    .desc-block[open] .desc-full {
      display: block;
    }
    .desc-close {
      display: inline;
      min-width: 0;
      border: 0;
      border-radius: 0;
      padding: 0;
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      font-size: 13px;
      font-weight: 760;
      line-height: inherit;
      white-space: nowrap;
    }
    .desc-close:hover {
      text-decoration: underline;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }
    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 11px;
      background: #fbfcfa;
      min-width: 0;
    }
    .label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .value {
      font-size: 20px;
      font-weight: 730;
      margin-top: 4px;
      overflow-wrap: anywhere;
    }
    .subvalue {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      margin-top: 3px;
      overflow-wrap: anywhere;
    }
    .section {
      margin-top: 18px;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 8px;
    }
    .section-title {
      font-size: 14px;
      font-weight: 760;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .section-subtitle {
      color: var(--muted);
      font-size: 12px;
    }
    .quality {
      grid-template-columns: repeat(6, minmax(0, 1fr));
      margin-bottom: 0;
    }
    .chart-section {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfa;
    }
    .chart-status {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .status-chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .status-chip.good {
      border-color: rgba(20, 114, 79, 0.22);
      background: #e9f5ef;
      color: #14724f;
    }
    .status-chip.caution {
      border-color: rgba(162, 58, 47, 0.20);
      background: #f8ece9;
      color: #a23a2f;
    }
    .chart-wrap {
      width: 100%;
      overflow: hidden;
    }
    .price-chart {
      display: block;
      width: 100%;
      height: auto;
      min-height: 190px;
    }
    .chart-grid {
      stroke: #e2e6de;
      stroke-width: 1;
    }
    .chart-line {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .chart-line.close {
      stroke: var(--accent);
      stroke-width: 3;
    }
    .chart-line.ma50 {
      stroke: #6d5bd0;
      stroke-width: 1.8;
    }
    .chart-line.ma200 {
      stroke: #c27820;
      stroke-width: 1.8;
    }
    .chart-axis, .chart-date {
      fill: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }
    .chart-date.end {
      text-anchor: end;
    }
    .chart-legend {
      display: flex;
      gap: 14px;
      align-items: center;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .chart-legend span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .legend-line {
      display: inline-block;
      width: 18px;
      height: 3px;
      border-radius: 999px;
      background: var(--accent);
    }
    .legend-line.ma50 { background: #6d5bd0; }
    .legend-line.ma200 { background: #c27820; }
    .options-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfa;
    }
    .options-card summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: pointer;
      padding: 12px;
      list-style: none;
    }
    .options-card summary::-webkit-details-marker {
      display: none;
    }
    .options-action {
      color: var(--accent);
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
    }
    .options-card[open] .options-action {
      display: none;
    }
    .options-body {
      border-top: 1px solid var(--line);
      padding: 10px 12px 12px;
      color: var(--muted);
      font-size: 13px;
    }
    .options-status {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .options-table {
      background: #fff;
    }
    .options-table table {
      min-width: 680px;
      font-size: 13px;
    }
    .options-table th,
    .options-table td {
      padding: 8px 9px;
    }
    .option-type {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 0 7px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 780;
    }
    .option-type.call {
      background: #e9f5ef;
      color: #14724f;
    }
    .option-type.put {
      background: #f8ece9;
      color: #a23a2f;
    }
    .options-note,
    .options-empty {
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
    }
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 560px;
      table-layout: fixed;
      font-size: 14px;
    }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: right;
      white-space: nowrap;
    }
    th:first-child, td:first-child { text-align: left; }
    th { background: #f1f3ee; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    tr:last-child td { border-bottom: 0; }
    .pos { color: #14724f; font-weight: 700; }
    .neg { color: #a23a2f; font-weight: 700; }
    .note {
      color: var(--muted);
      font-size: 13px;
      margin-top: 12px;
    }
    .warn { color: var(--warn); }
    .loading, .error {
      min-height: 220px;
      display: grid;
      place-items: center;
      color: var(--muted);
    }
    .error { color: #a23a2f; }
    .field-error {
      color: #a23a2f;
      font-size: 12px;
      margin: -6px 0 10px;
      min-height: 17px;
    }
    @media (max-width: 720px) {
      .wrap { width: min(100% - 16px, 1040px); padding-top: 12px; }
      header {
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 10px;
      }
      h1 { font-size: 23px; }
      .search {
        grid-column: 1 / -1;
        grid-row: 2;
      }
      .panel { padding: 11px; }
      .topline {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 11px;
      }
      .ticker { font-size: 30px; }
      .top-right {
        display: block;
        min-width: 130px;
        margin-left: auto;
      }
      .badge {
        min-height: 24px;
        padding: 0 8px;
        font-size: 12px;
        margin-bottom: 8px;
      }
      .quote-inline {
        border-left: 0;
        padding-left: 0;
        min-width: 0;
      }
      .quote-label { font-size: 10px; }
      .quote-main { font-size: 22px; }
      .quote-change { font-size: 12px; white-space: normal; }
      .quote-time { font-size: 10px; white-space: normal; }
      .profile { gap: 6px; margin-top: 10px; font-size: 12px; }
      .profile span { padding: 4px 6px; }
      .desc,
      .desc-block summary { font-size: 14px; line-height: 1.32; }
      .desc,
      .desc-block { margin-bottom: 13px; }
      .desc-toggle,
      .desc-close { font-size: 12px; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 7px; margin-bottom: 13px; }
      .quality { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .metric { padding: 8px 8px; }
      .label { font-size: 10px; letter-spacing: 0.05em; }
      .value { font-size: 16px; }
      .subvalue { font-size: 11px; }
      .section { margin-top: 14px; }
      .section-head { display: block; }
      .section-subtitle { margin-top: 2px; }
      .chart-section { padding: 9px; }
      .options-card summary { padding: 9px; }
      .options-body { padding: 8px 9px 9px; }
      .options-table table { min-width: 0; font-size: 12px; }
      .options-table th,
      .options-table td { padding: 7px 4px; }
      .status-chip { font-size: 11px; min-height: 22px; padding: 0 7px; }
      .price-chart { min-height: 170px; }
      .chart-axis, .chart-date { font-size: 11px; }
      .table-wrap { overflow-x: visible; }
      table { min-width: 0; font-size: 13px; }
      th, td { padding: 8px 5px; }
      th { font-size: 10px; letter-spacing: 0.03em; }
      th:nth-child(1), td:nth-child(1) { width: 17%; }
      th:nth-child(2), td:nth-child(2) { width: 18%; }
      th:nth-child(3), td:nth-child(3) { width: 20%; }
      th:nth-child(4), td:nth-child(4) { width: 24%; }
      th:nth-child(5), td:nth-child(5) { width: 21%; }
    }
    @media print {
      header {
        grid-template-columns: 1fr auto;
      }
      header a,
      .search,
      .field-error,
      .meta {
        display: none;
      }
      .desc-block summary {
        display: none;
      }
      .desc-block .desc-full {
        display: block;
      }
      .desc-close {
        display: none;
      }
      .options-card {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="app-header">
      <div class="brand">
        <a class="brand-title" href="/">Market Sweep</a>
        <div class="brand-subtitle">Single-ticker dashboard</div>
      </div>
      <form id="fund-form" class="search">
        <div class="search-field">
          <input id="ticker" name="ticker" autocomplete="off" autocapitalize="characters" spellcheck="false" value="WMT" aria-label="Ticker" placeholder="Ticker" />
        </div>
        <button id="load-button" type="submit">Load</button>
      </form>
      <nav class="app-nav" aria-label="Primary">
        <a href="/">News</a>
        <a class="active" href="/fund/">Ticker</a>
      </nav>
    </header>

    <div id="field-error" class="field-error" role="status" aria-live="polite"></div>
    <div id="meta" class="meta">SEC companyfacts + Yahoo chart metadata, cached at the edge.</div>
    <section id="output" class="panel loading">Loading WMT...</section>
  </main>

  <script src="/fund/fund.js" defer></script>
</body>
</html>
